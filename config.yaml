# ============================================================================
# Audio Explorers – Scene Analysis Pipeline Configuration
# ============================================================================
# This file stores all shared parameters. Every member script should load
# this config via src/common/config.py so that values are consistent.
# ============================================================================

project:
  name: "Audio Explorers – Hearing-Aid Microphone Array Scene Analysis"
  version: "0.2.0"

audio:
  sample_rate: 44100          # Hz – fixed for all recordings
  n_channels: 4
  channel_order:              # physical mic positions on hearing-aid pair
    - "LF"                    # Left-Front
    - "LR"                    # Left-Rear
    - "RF"                    # Right-Front
    - "RR"                    # Right-Rear

# ── STFT parameters ────────────────────────────────────────────────────
# We keep n_fft=1024 / hop=256 (the original scaffold defaults) because
# they give fine temporal resolution (~5.8 ms per frame) which benefits
# the frame-level DoA estimation.  A larger n_fft=2048 / hop=512 would
# improve frequency resolution but halve the number of DoA frames and
# may blur fast speaker turn-taking.  Downstream members who need
# coarser STFT can always re-compute from the WAV.
stft:
  n_fft: 1024
  hop_length: 256
  win_length: 1024
  window: "hann"

# ── DoA estimation ─────────────────────────────────────────────────────
doa:
  method: "calibrated_srp_phat"   # weighted SRP-PHAT with pair grouping
  n_grid: 360                     # azimuth bins (1° resolution)
  freq_range: [300, 8000]         # Hz – speech band for DoA

  # ── Microphone-pair groups ──────────────────────────────────────────
  # The 4 BTE mics form 6 unique pairs, classified by baseline geometry:
  #
  #   on_ear    – same ear, front-rear (12 mm x-axis baseline)
  #               Best at resolving front vs back.
  #   lateral   – cross-ear, same slot (175 mm y-axis baseline)
  #               Strong left/right cue, but CANNOT distinguish front
  #               from back because their purely inter-aural baseline
  #               makes sin(θ) symmetric about 90°/270°.
  #   diagonal  – cross-ear, different slot (~175 mm baseline at ~86°)
  #               Mixed evidence: strong left/right plus a small
  #               front/back component from the 12 mm x-offset.
  #
  # Design rationale – why we weight instead of dropping pairs:
  #   Hard-dropping the lateral pairs would discard valid left/right
  #   information.  Instead we keep all 6 pairs but down-weight the
  #   laterals so their front/back ghosts are suppressed while their
  #   side-discrimination power is retained.  On-ear pairs receive the
  #   highest weight because they are the ONLY pairs whose baseline
  #   lies along the front/back axis.
  use_pair_groups:
    on_ear: true                  # LF-LR, RF-RR
    lateral: true                 # LF-RF, LR-RR
    diagonal: true                # LF-RR, LR-RF

  pair_weights:
    LF_LR: 1.0                   # on-ear  (left)
    RF_RR: 1.0                   # on-ear  (right)
    LF_RF: 0.3                   # lateral (front)
    LR_RR: 0.3                   # lateral (rear)
    LF_RR: 0.8                   # diagonal
    LR_RF: 0.8                   # diagonal

  # Weighting mode controls how pair weights are applied:
  #   "pair_group_weighted" – fixed weights from pair_weights above
  weighting_mode: "pair_group_weighted"

  # Peak detection in step 03
  top_k_peaks_per_frame: 4       # max peaks per frame (before gating)
  min_peak_distance_deg: 30      # minimum separation between peaks
  peak_rel_threshold: 0.15       # peaks must exceed this fraction of max
  second_peak_ratio: 0.40        # 2nd+ peaks must be ≥ 40% of strongest

  # Temporal persistence rescue — secondary peaks that recur at a similar
  # angle in neighbouring frames are rescued even if they fail the height gate.
  temporal_persist_window: 5     # half-window of frames to check
  temporal_persist_count: 3      # must appear in ≥ N of those frames
  temporal_persist_tol_deg: 8.0  # angular tolerance for "same angle"

  # Global-direction tracking
  # Step 03 uses time-averaged power to find stable speaker directions,
  # then assigns per-frame peaks to these directions.  This avoids the
  # over-fragmentation that DBSCAN produces on intermittent speakers.
  global_peak_prominence: 0.075  # prominence for global direction peaks
  max_assign_dist_deg: 20.0      # max angular distance for assignment
  smooth_track_sigma: 5          # Gaussian smoothing of tracks (frames)

  # Track quality filtering
  min_track_points_frac: 0.05    # min points as fraction of n_frames
  min_track_duration_s: 0.5      # min total active duration (seconds)
  # min_track_score_ratio: 0.55  # (replaced by burst + pair-group filtering)

  # Smart filtering — local burst + pair-group evidence
  burst_window_s: 1.0            # window for local burst analysis (seconds)
  burst_score_ratio: 0.50        # mean_top3 must be >= this × best track's
  burst_abs_floor: 0.0           # absolute minimum burst score (keeps weak tracks)
  burst_percentile: 40.0         # percentile-based burst floor across all tracks
  min_group_count: 2             # confirmed if >= N pair groups support it
  group_threshold_ratio: 0.40    # group score threshold = ratio × best
  group_abs_threshold: 0.10      # absolute floor for pair-group support

  # Track merging — rejoin tracks that are close in angle AND overlapping
  # in time (targets the "one speaker split into two confirmed" failure)
  merge_max_sep_deg: 12.0        # max angular separation to consider merge
  merge_min_temporal_iou: 0.60   # min temporal IoU to trigger merge

  # Wide-angle sidelobe / reflection merge – catches sidelobes that
  # the narrow 12° merge misses (e.g. same source heard at 265° and 280°)
  wide_merge_max_sep_deg: 40.0
  wide_merge_min_temporal_iou: 0.50

  # Provisional cluster consolidation — when ≥N provisionals form a
  # single-linkage cluster (sidelobe fan), keep only the best one.
  provisional_cluster_gap_deg: 40.0   # max angular gap for chain-linking
  provisional_cluster_min_size: 3     # min cluster size to trigger thinning
  provisional_cluster_max_keep: 1     # keep at most N per cluster

  # Windowed discovery – catches intermittent speakers the global average misses
  use_windowed_discovery: true
  window_duration_s: 1.5         # window length in seconds
  window_overlap_frac: 0.5       # overlap between adjacent windows
  windowed_peak_min_count: 3     # direction must appear in ≥ N windows

  # Track splitting – splits bimodal clusters before track building
  split_broad_tracks: true
  track_split_std_deg: 18.0      # circular std threshold to trigger split
  track_split_min_points: 30     # both subtracks must have ≥ N points
  presplit_max_temporal_overlap: 0.70  # reject split if sub-cluster temporal IoU > this

  # Diffuseness rejection – removes garbage tracks with excessive spread
  reject_diffuse_std_deg: 30.0   # reject tracks with angular std > this

  # Dual-map tracking – SRP-norm for discovery, hybrid for scoring
  use_dual_map_tracking: true

  # Discovery thresholds – more permissive to find all candidate directions
  discovery_global_rel_threshold: 0.07
  discovery_global_prominence: 0.10
  discovery_max_global_dirs: 10
  windowed_rel_threshold: 0.15
  discovery_max_windowed_dirs: 6
  discovery_merge_sep_deg: 15.0

  # Residual discovery – finds directions missed by global + windowed
  use_residual_discovery: true
  residual_num_passes: 2
  residual_min_support_frames: 50
  residual_merge_sep_deg: 15.0
  discovery_max_total_dirs: 14

  # Second-pass track splitting
  track_second_pass_split: true
  track_second_pass_min_sep_deg: 15.0

  # Calibration
  calibration_n_clusters: 4      # number of speaker directions to learn
  calibration_source: "example"  # tag of the WAV used for calibration
  calibration_energy_quantile: 0.30        # reject bottom 30% frames by energy
  calibration_confidence_quantile: 0.30    # among energy-passing, keep top 30% by confidence
  calibration_max_frames: null             # optional hard cap (null = no cap)

  # Balanced refinement — after initial clustering, cap each direction
  # at target_frames_per_direction best frames so no direction dominates.
  calibration_balanced_refinement: true
  calibration_target_frames_per_direction: 150
  calibration_min_frames_per_direction: 40

  # Hybrid DoA scoring — combine SRP-PHAT with delay-domain template match
  use_hybrid_doa_score: true           # enable hybrid SRP + template scoring
  template_score_weight: 0.20          # blend: 0.80*SRP + 0.20*template
  delay_mismatch_sigma_us: 15.0        # Gaussian kernel width in µs

  # Dynamic reliability weighting — per-frame, per-pair confidence gates
  # noisy cross-correlations so they don't pollute SRP sidelobes
  use_reliability_weighting: true

# ── Enhancement ────────────────────────────────────────────────────────
enhancement:
  mvdr_diagonal_loading: 1.0e-6
  mask_sigma_deg: 6.0
  mask_time_smooth_sigma: 0.3
  mask_floor: 0.0
  use_spatial_masks: true
  mask_exponent: 3.0
  include_provisionals: true
  provisional_min_score: 0.65
  provisional_min_duration_s: 4.0
  spatial_pilot_threshold: 0.90
  use_interferer_nulling: true
  null_steering_strength: 2.5     # base scale factor for spatial null constraints
  steering_mode: "doa_model"        # "doa_model" or "eigen"

  # Subband masking – per-frequency masks via narrowband SRP alignment
  use_subband_masks: true
  subband_smooth_bins: 8           # smooth alignment across this many freq bins

  # Segment-wise steering – per-block azimuth adapts to direction changes
  segment_steering: true
  steering_block_frames: 200       # block size in STFT frames (~1.2 s)

  postfilter: "wiener"                # Options: none, wiener, binary_mask

# ── Analysis ───────────────────────────────────────────────────────────
analysis:
  vad_mode: 3
  whisper_model: "large-v3"
  language_id_model: "speechbrain/lang-id-voxlingua107-ecapa"
  min_speech_duration_s: 0.3

  # Whisper decoding parameters
  whisper_beam_size: 5
  whisper_compression_ratio_threshold: 2.0    # tighter to reject repetition loops
  whisper_log_prob_threshold: -1.0             # keep default (was too strict at -0.8)
  whisper_no_speech_threshold: 0.6
  whisper_initial_prompt: null                  # disabled (prompt text can leak into output)

  # Pitch / voice-type classification thresholds
  pitch_male_female_hz: 175       # below → male, above → female
  pitch_female_child_hz: 260      # above → child
  pitch_mask_floor: 0.3           # ignore frames with mask weight below this
  pitch_percentile: 25            # use P25 instead of median for robustness

# ── Fusion ─────────────────────────────────────────────────────────────
fusion:
  talker_of_interest_strategy: "highest_score"
  score_weights:
    doa_stability: 0.3
    speech_duration: 0.3
    language_match: 0.2
    snr_estimate: 0.2

# ── Paths ──────────────────────────────────────────────────────────────
paths:
  data_dir: "data"
  output_dir: "outputs"
  models_dir: "models"

# ── Logging ────────────────────────────────────────────────────────────
logging:
  level: "INFO"
  format: "%(asctime)s | %(name)-28s | %(levelname)-7s | %(message)s"
